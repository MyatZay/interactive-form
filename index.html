<!doctype html>
<html lang="en" xmlns:mso="urn:schemas-microsoft-com:office:office" xmlns:msdt="uuid:C2F41010-65B3-11d1-A29F-00AA00C14882">
  <head>
    <meta charset="UTF-8" />
    <title>Interactive Web Form Assignment</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="css/styles.css" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <h2 class="mb-4">Interactive Web Form</h2>
          <form>
            <!-- Username Field -->
            <div class="mb-3">
              <label for="username" class="form-label">Username:</label>
              <input type="text" class="form-control" id="username" placeholder="Enter username" />
              <small id="usernameError" class="error-text"></small>
            </div>

            <!-- Email Field -->
            <div class="mb-3">
              <label for="email" class="form-label">Email:</label>
              <input type="email" class="form-control" id="email" placeholder="Enter email" />
              <small id="emailError" class="error-text"></small>
            </div>

            <!-- Password Field -->
            <div class="mb-3">
              <label for="password" class="form-label">Password:</label>
              <input type="password" class="form-control" id="password" placeholder="Enter password" />
              <small id="passwordError" class="error-text"></small>
            </div>

            <!-- Confirm Password Field -->
            <div class="mb-3">
              <label for="confirmPassword" class="form-label">Confirm Password:</label>
              <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password" />
              <small id="confirmPasswordError" class="error-text"></small>
            </div>

            <!-- Topics Checkboxes -->
            <div class="mb-3">
              <label class="form-label">Interesting Topics:</label>
              <div>
                <div class="form-check">
                  <input class="form-check-input topic" type="checkbox" id="sports" value="sports" />
                  <label class="form-check-label" for="sports">Sports</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input topic" type="checkbox" id="technology" value="technology" />
                  <label class="form-check-label" for="technology">Technology</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input topic" type="checkbox" id="music" value="music" />
                  <label class="form-check-label" for="music">Music</label>
                </div>
                <div class="form-check">
                  <input class="form-check-input topic" type="checkbox" id="travel" value="travel" />
                  <label class="form-check-label" for="travel">Travel</label>
                </div>
              </div>
              <small id="topicsError" class="error-text"></small>
            </div>

            <!-- Gender Dropdown -->
            <div class="mb-3">
              <label for="gender" class="form-label">Gender:</label>
              <select class="form-select" id="gender">
                <option value="--">-- Select Gender --</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
              </select>
              <small id="genderError" class="error-text"></small>
            </div>

            <!-- Submit Button -->
            <button type="button" class="btn btn-primary w-100" id="submitBtn">Submit</button>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
  </body>
</html>
